name: Neovim healthcheck

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  health:
    runs-on: ubuntu-22.04 # pin runner for determinism
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            nodejs \
            python3 \
            python3-pip

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Cache Neovim data
        uses: actions/cache@v4
        with:
          path: |
            .local
          key: nvim-${{ runner.os }}-${{ hashFiles('lua/custom/pack/specs.lua', 'lua/custom/plugins/*.lua') }}
          restore-keys: |
            nvim-${{ runner.os }}-

      - name: Run pack smoke
        run: |
          set -euo pipefail
          scripts/nvim-pack-smoke

      - name: Run FIM smoke
        run: |
          set -euo pipefail
          scripts/nvim-fim-smoke

      - name: Run checkhealth
        run: |
          set -euo pipefail
          scripts/nvim-local --headless -l .github/healthcheck.lua
